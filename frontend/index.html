<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaPet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav-bar></nav-bar>

    <main class="layout">

        <section class="feed">
            <post-card
                username="cleber"
                pet-name="Luna"
                image=""
                caption="Passeio no parque"
                likes="12"
                avatar=""
            ></post-card>
            <post-card
                username="diogo"
                pet-name="Bobby"
                image=""
                caption="Hora do lanche"
                likes="34"
                avatar=""
            ></post-card>
        </section>

        <aside class="sidebar">
            <user-card
                username="cleber"
                pet-name="Luna"
                posts="12"
                followers="120"
                following="80"
                avatar=""
            ></user-card>
            <user-card
                username="diogo"
                pet-name="Bobby"
                posts="20"
                followers="300"
                following="150"
                avatar=""
            ></user-card>
        </aside>

    </main>

    <script src="webcomponent/navbar.js"></script>
    <script src="webcomponent/postcard.js"></script>
    <script src="webcomponent/usercard.js"></script>

</body>

</html>
