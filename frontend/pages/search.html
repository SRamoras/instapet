<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaPet – Pesquisa</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav-bar logo="🐾 InstaPet"></nav-bar>

  <div class="layout">

    <aside class="sidebar" id="left-sidebar-container"></aside>

    <main class="feed">

      <search-bar placeholder="Pesquisar por pets, usuários..."></search-bar>

      <div id="search-results">
        <p class="feed__status">A carregar pessoas...</p>
      </div>

    </main>

  </div>

  <app-footer></app-footer>

  <script type="module">
    import '../webcomponent/layout/navbar.js';
    import '../webcomponent/layout/footer.js';
    import '../webcomponent/ui/button.js';
    import '../webcomponent/search/search-bar/search-bar.js';
    import '../webcomponent/search/search-results/search-results.js';
    import '../webcomponent/feed/feed-sidebar-left/feed-sidebar-left.js';
    import { getPosts } from '../services/posts.js';
    import { getMe, getUser } from '../services/users.js';

    const leftSidebarContainer = document.getElementById('left-sidebar-container');
    const resultsContainer = document.getElementById('search-results');

    let people = [];

    async function loadSidebar() {
      const sidebar = document.createElement('feed-sidebar-left');
      try {
        const user = await getMe();
        sidebar.setAttribute('username',     user.username ?? '');
        sidebar.setAttribute('display-name', user.display_name ?? user.username ?? '');
        sidebar.setAttribute('avatar',       user.avatar_url ?? '');
        sidebar.setAttribute('likes',        user.like_count ?? '0');
        sidebar.setAttribute('followers',    user.follower_count ?? '0');
        sidebar.setAttribute('following',    user.following_count ?? '0');
      } catch { /* sem sessão, mostra defaults */ }
      leftSidebarContainer.appendChild(sidebar);
    }

    function renderPeople(list) {
      resultsContainer.innerHTML = '';

      if (!list.length) {
        resultsContainer.innerHTML = '<p class="feed__status">Nenhuma pessoa encontrada.</p>';
        return;
      }

      const results = document.createElement('search-results');
      results.setAttribute('users', JSON.stringify(list));
      resultsContainer.appendChild(results);
    }

    async function loadPeople() {
      try {
        const posts = await getPosts('?limit=100');

        const postCountByUsername = {};
        posts.forEach((post) => {
          const username = post.author_username;
          if (!username) return;
          postCountByUsername[username] = (postCountByUsername[username] ?? 0) + 1;
        });

        const usernames = Object.keys(postCountByUsername);

        if (!usernames.length) {
          resultsContainer.innerHTML = '<p class="feed__status">Nenhuma pessoa encontrada.</p>';
          return;
        }

        const users = await Promise.all(usernames.map((username) => getUser(username).catch(() => null)));

        people = users
          .filter(Boolean)
          .map((user) => ({
            username:    user.username,
            displayName: user.display_name || user.username,
            avatar:      user.avatar_url || '',
            postCount:   postCountByUsername[user.username] ?? 0,
          }));

        renderPeople(people);
      } catch {
        resultsContainer.innerHTML = '<p class="feed__status feed__status--error">Erro ao carregar pessoas.</p>';
      }
    }

    function filterPeople(query) {
      const q = query.trim().toLowerCase();
      if (!q) return renderPeople(people);
      renderPeople(people.filter((p) =>
        p.username.toLowerCase().includes(q) || p.displayName.toLowerCase().includes(q)
      ));
    }

    document.addEventListener('search-submit', (e) => filterPeople(e.detail.query));
    document.addEventListener('search-input',  (e) => filterPeople(e.detail.query));

    loadSidebar();
    loadPeople();
  </script>

</body>
</html>
